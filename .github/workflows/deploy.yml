name: Deploy Worker

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target environment"
        required: true
        type: choice
        default: "Production"
        options:
          - Production
          - Development

concurrency:
  group: deploy-worker-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Production' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Production' }}

    env:
      NODE_VERSION: 24.12.0
      PNPM_VERSION: 10.27.0

      NEXT_PUBLIC_APP_ROOT_URL: ${{ vars.NEXT_PUBLIC_APP_ROOT_URL }}
      NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libnss3 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxss1 \
            libgtk-3-0

      - name: Generate resume PDF
        run: pnpm run generate:resume-pdf

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
