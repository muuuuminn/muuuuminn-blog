name: Deploy Worker

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target environment"
        required: true
        type: choice
        default: "Production"
        options:
          - Production
          - Development

concurrency:
  group: deploy-worker-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Production' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Production' }}

    env:
      NODE_VERSION: 24.12.0
      PNPM_VERSION: 10.27.0

      NEXT_PUBLIC_APP_ROOT_URL: ${{ vars.NEXT_PUBLIC_APP_ROOT_URL }}
      NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
